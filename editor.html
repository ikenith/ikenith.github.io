<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Editor | The Roots</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.js"></script>

  <style>
    body {
      background: #0a0a0f;
      color: #e5e7eb;
      font-family: Inter, system-ui, sans-serif;
    }

    .editor-card {
      background: #18181b;
      border-radius: 1.5rem;
      padding: 2rem;
      max-width: 900px;
      margin: 2rem auto;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    textarea {
      width: 100%;
      min-height: 300px;
      background: #23272a;
      color: #fff;
      border-radius: 1rem;
      padding: 1.2rem;
      border: 1px solid #374151;
      resize: vertical;
      font-size: 1.08rem;
      outline: none;
      transition: all 0.2s;
    }

    textarea:focus {
      border-color: #0ea5e9;
      box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.1);
    }

    .preview {
      background: #23272a;
      border-radius: 1rem;
      padding: 1.2rem;
      margin-top: 1rem;
      min-height: 200px;
      color: #e0e7ef;
      font-size: 1.05rem;
      border: 1px solid #374151;
    }

    .toolbar button {
      background: #374151;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      margin-right: 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .toolbar button:hover {
      background: #4b5563;
      transform: translateY(-1px);
    }

    .input-field {
      background: #23272a;
      color: #fff;
      border: 1px solid #374151;
      border-radius: 0.5rem;
      padding: 0.75rem;
      width: 100%;
      margin-bottom: 1rem;
      transition: all 0.2s;
    }

    .input-field:focus {
      outline: none;
      border-color: #0ea5e9;
      box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.1);
    }

    .btn-primary {
      background: #0ea5e9;
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 1.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background: #0284c7;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #374151;
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: #4b5563;
    }

    .status-message {
      padding: 1rem;
      border-radius: 0.5rem;
      margin: 1rem 0;
      display: none;
    }

    .status-success {
      background: #065f46;
      color: #34d399;
      border: 1px solid #34d399;
    }

    .status-error {
      background: #7f1d1d;
      color: #fca5a5;
      border: 1px solid #fca5a5;
    }

    .file-input-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
    }

    .file-input-wrapper input[type="file"] {
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .file-input-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: #23272a;
      color: #fff;
      border-radius: 0.75rem;
      padding: 0.75rem 1.5rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px dashed #4b5563;
      text-align: center;
    }

    .file-input-button:hover {
      background: #2a2e32;
      border-color: #6b7280;
    }

    .crop-button {
      background: #0ea5e9;
      color: white;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .crop-button:hover {
      background: #0284c7;
      transform: translateY(-2px);
    }

    .cropper-container {
      max-width: 100%;
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <main>
    <div class="editor-card">
      <!-- Logo and Title -->
      <div class="flex items-center gap-3 mb-6">
        <span class="inline-block">
          <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
            <rect width="38" height="38" rx="12" fill="#23272a" />
            <text x="7" y="27" font-size="22" font-family="monospace" fill="#fff">MD</text>
          </svg>
        </span>
        <h1 class="text-3xl font-bold text-white">Markdown Editor</h1>
      </div>

      <!-- Status Messages -->
      <div id="status" class="status-message"></div>

      <!-- Token Input -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-300 mb-2">
          GitHub Personal Access Token *
        </label>
        <input 
          type="password" 
          id="github-token" 
          class="input-field" 
          placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
          autocomplete="off"
        />
        <p class="text-xs text-gray-400 mt-1">
          Create a fine-grained token with <strong>Repository permissions: Contents (Read and Write)</strong> at: GitHub Settings → Developer settings → Personal access tokens
        </p>
      </div>

      <!-- Post Metadata -->
      <div class="mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">
            Post Title *
          </label>
          <input 
            type="text" 
            id="post-title" 
            class="input-field" 
            placeholder="Enter post title" 
            autocomplete="off"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">
            Publication Date *
          </label>
          <input 
            type="date" 
            id="post-date" 
            class="input-field"
          />
        </div>
      </div>

      <!-- Image Upload with Cropping -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-300 mb-2">
          Cover Image (optional)
        </label>
        <div class="file-input-wrapper">
          <div class="file-input-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7"></path>
              <line x1="16" y1="5" x2="22" y2="5"></line>
              <line x1="19" y1="2" x2="19" y2="8"></line>
              <circle cx="9" cy="9" r="2"></circle>
              <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
            </svg>
            <span>Choose and Crop Image</span>
          </div>
          <input type="file" id="post-image" accept="image/*">
        </div>
        
        <!-- Image Preview and Cropping Area -->
        <div id="image-cropper" class="hidden mt-4">
          <div class="bg-black p-4 rounded-lg">
            <img id="crop-image" class="max-w-full max-h-96 mx-auto" />
          </div>
          <div class="flex justify-center mt-3 gap-3">
            <button id="crop-btn" class="crop-button">
              Crop & Use Image
            </button>
            <button id="cancel-crop" class="btn-secondary">
              Cancel
            </button>
          </div>
        </div>

        <!-- Cropped Image Preview -->
        <div id="cropped-preview" class="hidden mt-4">
          <label class="block text-sm font-medium text-gray-300 mb-2">Cropped Preview</label>
          <img id="cropped-image" class="max-w-xs rounded-lg border border-gray-600" />
        </div>
      </div>

      <!-- Toolbar -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-2">
          Formatting Tools
        </label>
        <div class="toolbar flex flex-wrap gap-2">
          <button onclick="insertMd('**', '**')"><b>Bold</b></button>
          <button onclick="insertMd('*', '*')"><i>Italic</i></button>
          <button onclick="insertMd('`', '`')">Code</button>
          <button onclick="insertMd('# ', '')">H1</button>
          <button onclick="insertMd('## ', '')">H2</button>
          <button onclick="insertMd('- ', '')">List</button>
          <button onclick="insertMd('![alt text](', ')')">Image</button>
          <button onclick="insertMd('[', '](url)')">Link</button>
          <button onclick="insertMd('> ', '')">Quote</button>
        </div>
      </div>

      <!-- Editor -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-300 mb-2">
          Markdown Content *
        </label>
        <textarea 
          id="md-input" 
          placeholder="# Welcome to your new post

Write your content here using markdown...

## Features
- Easy formatting
- Live preview
- Image support

```javascript
// Code blocks work too!
console.log('Hello World');
```"
        ></textarea>
      </div>
      
      <!-- Preview -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-300 mb-2">
          Live Preview
        </label>
        <div class="preview" id="md-preview"></div>
      </div>

      <!-- Action Buttons -->
      <div class="flex gap-3">
        <button id="save-btn" class="btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="inline mr-2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
            <polyline points="17 21 17 13 7 13 7 21"></polyline>
            <polyline points="7 3 7 8 15 8"></polyline>
          </svg>
          Save Post
        </button>
        <button onclick="clearForm()" class="btn-secondary">
          Clear Form
        </button>
      </div>
    </div>
  </main>

  <script>
    // Global variables
    let cropper = null;
    let croppedImageData = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      // Set today's date as default
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('post-date').value = today;
      
      // Initialize markdown preview
      const input = document.getElementById('md-input');
      const preview = document.getElementById('md-preview');
      
      input.addEventListener('input', () => {
        preview.innerHTML = marked.parse(input.value || '*Start writing to see preview...*');
      });
      
      // Initialize preview
      preview.innerHTML = marked.parse(input.value || '*Start writing to see preview...*');

      // Initialize image cropping
      initializeImageCropping();
    });

    // Image cropping functionality
    function initializeImageCropping() {
      const imageInput = document.getElementById('post-image');
      const imageCropper = document.getElementById('image-cropper');
      const cropImage = document.getElementById('crop-image');
      const cropBtn = document.getElementById('crop-btn');
      const cancelCrop = document.getElementById('cancel-crop');
      const croppedPreview = document.getElementById('cropped-preview');

      imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // Check if file is an image
        if (!file.type.match('image.*')) {
          showStatus('Please select an image file', 'error');
          return;
        }

        const reader = new FileReader();
        reader.onload = function(event) {
          cropImage.src = event.target.result;
          imageCropper.classList.remove('hidden');
          
          // Destroy existing cropper
          if (cropper) {
            cropper.destroy();
          }
          
          // Initialize cropper
          cropper = new Cropper(cropImage, {
            aspectRatio: 16 / 9,
            viewMode: 1,
            background: false,
            autoCropArea: 0.8,
            responsive: true,
            restore: false,
            guides: true,
            center: true,
            highlight: false,
            cropBoxMovable: true,
            cropBoxResizable: true,
            toggleDragModeOnDblclick: false,
          });
        };
        reader.readAsDataURL(file);
      });

      cropBtn.addEventListener('click', function() {
        if (!cropper) return;

        // Get cropped canvas
        const canvas = cropper.getCroppedCanvas({
          width: 1200,
          height: 675,
          imageSmoothingQuality: 'high'
        });

        // Convert to data URL
        croppedImageData = canvas.toDataURL('image/jpeg', 0.85);
        
        // Show preview
        document.getElementById('cropped-image').src = croppedImageData;
        croppedPreview.classList.remove('hidden');
        
        // Hide cropper
        imageCropper.classList.add('hidden');
        
        showStatus('Image cropped successfully!', 'success');
      });

      cancelCrop.addEventListener('click', function() {
        imageCropper.classList.add('hidden');
        document.getElementById('post-image').value = '';
        if (cropper) {
          cropper.destroy();
          cropper = null;
        }
      });
    }

    // Markdown helper functions
    window.insertMd = function(before, after) {
      const input = document.getElementById('md-input');
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const value = input.value;
      const selected = value.substring(start, end);
      
      let insertText = before + selected + after;
      
      // Special handling for list items and headings
      if ((before.startsWith('- ') || before.startsWith('#') || before.startsWith('##') || before.startsWith('>')) && !selected) {
        insertText = before;
      }
      
      input.value = value.substring(0, start) + insertText + value.substring(end);
      input.focus();
      
      // Set cursor position
      const cursorPos = start + insertText.length;
      input.setSelectionRange(cursorPos, cursorPos);
      
      // Update preview
      document.getElementById('md-preview').innerHTML = marked.parse(input.value);
    };

    // Status message helper
    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = `status-message status-${type}`;
      status.style.display = 'block';
      
      setTimeout(() => {
        status.style.display = 'none';
      }, 5000);
    }

    // Clear form
    function clearForm() {
      document.getElementById('post-title').value = '';
      document.getElementById('post-date').value = new Date().toISOString().split('T')[0];
      document.getElementById('post-image').value = '';
      document.getElementById('md-input').value = '';
      document.getElementById('md-preview').innerHTML = marked.parse('*Start writing to see preview...*');
      
      // Clear image cropper
      document.getElementById('image-cropper').classList.add('hidden');
      document.getElementById('cropped-preview').classList.add('hidden');
      croppedImageData = null;
      
      if (cropper) {
        cropper.destroy();
        cropper = null;
      }
      
      showStatus('Form cleared', 'success');
    }

    // Save post function
    document.getElementById('save-btn').onclick = async function() {
      const token = document.getElementById('github-token').value.trim();
      const title = document.getElementById('post-title').value.trim();
      const date = document.getElementById('post-date').value;
      const markdown = document.getElementById('md-input').value.trim();

      // Validation
      if (!token) {
        showStatus('Please enter your GitHub Personal Access Token', 'error');
        return;
      }

      if (!title) {
        showStatus('Please enter a post title', 'error');
        return;
      }

      if (!date) {
        showStatus('Please select a publication date', 'error');
        return;
      }

      if (!markdown) {
        showStatus('Please write some content for your post', 'error');
        return;
      }

      try {
        // Create filename from title
        const filename = title.toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/(^-|-$)+/g, '') + '.md';

        // Handle image upload if exists
        let imageUrl = '';
        if (croppedImageData) {
          imageUrl = await uploadImageToGitHub(token, title, croppedImageData);
        }

        // Create frontmatter
        const frontmatter = [
          '---',
          `title: "${title.replace(/"/g, '\\"')}"`,
          `date: "${date}"`,
          imageUrl && `image: "${imageUrl}"`,
          '---',
          ''
        ].filter(line => line !== false && line !== null).join('\n');

        const content = frontmatter + markdown;
        const filePath = `posts/${filename}`;
        const repo = 'ikenith/ikenith.github.io';

        // Check if file exists to get SHA (for updates)
        let sha = null;
        try {
          const existingFile = await fetch(
            `https://api.github.com/repos/${repo}/contents/${filePath}`,
            {
              headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json'
              }
            }
          );
          
          if (existingFile.ok) {
            const fileData = await existingFile.json();
            sha = fileData.sha;
          }
        } catch (error) {
          // File doesn't exist, which is fine for new posts
        }

        // Create or update file
        const response = await fetch(
          `https://api.github.com/repos/${repo}/contents/${filePath}`,
          {
            method: 'PUT',
            headers: {
              'Authorization': `token ${token}`,
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              message: `Add post: ${title}`,
              content: btoa(unescape(encodeURIComponent(content))),
              sha: sha
            })
          }
        );

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.message || `GitHub API error: ${response.status}`);
        }

        showStatus(`Post "${title}" saved successfully!`, 'success');
        
        // Clear form on success
        setTimeout(() => {
          clearForm();
        }, 2000);
        
      } catch (error) {
        console.error('Error saving post:', error);
        
        let errorMessage = 'Failed to save post: ';
        if (error.message.includes('401') || error.message.includes('Bad credentials')) {
          errorMessage += 'Invalid token. Please check your GitHub Personal Access Token.';
        } else if (error.message.includes('403')) {
          errorMessage += 'Token does not have write permissions. Please ensure your token has "repo" scope.';
        } else if (error.message.includes('422')) {
          errorMessage += 'File already exists or validation failed.';
        } else {
          errorMessage += error.message;
        }
        
        showStatus(errorMessage, 'error');
      }
    };

    // Upload image to GitHub
    async function uploadImageToGitHub(token, title, imageData) {
      const repo = 'ikenith/ikenith.github.io';
      
      // Convert data URL to blob
      const response = await fetch(imageData);
      const blob = await response.blob();
      
      // Convert blob to base64
      const base64 = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(blob);
      });

      // Create filename for image
      const imageFilename = title.toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/(^-|-$)+/g, '') + '.jpg';

      const imagePath = `images/${imageFilename}`;

      // Upload image
      const imageResponse = await fetch(
        `https://api.github.com/repos/${repo}/contents/${imagePath}`,
        {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: `Add image for post: ${title}`,
            content: base64
          })
        }
      );

      if (!imageResponse.ok) {
        throw new Error('Failed to upload image');
      }

      // Return the raw GitHub URL for the image
      return `https://raw.githubusercontent.com/${repo}/main/${imagePath}`;
    }
  </script>
</body>
</html>
