<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Post | The Roots</title>
  <link rel="icon" type="image/svg+xml" href="style/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      background: #0a0a0f;
      color: #e5e7eb;
      font-family: Inter, system-ui, sans-serif;
      min-height: 100vh;
      width: 100vw;
      margin: 0;
      padding: 0;
    }

    /* Post title */
    .post-title {
      font-family: Poppins, Inter, sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.5rem);
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin-bottom: 0.5rem;
      margin-top: 1.5rem;
      word-break: break-word;
      line-height: 1.2;
    }

    .post-date {
      text-align: center;
      color: #bcbcbc;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      margin-bottom: 2rem;
    }

    /* Post image */
    .post-image {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .post-image img {
      border-radius: 1.1rem;
      width: 100%;
      max-width: 420px;
      height: auto;
      object-fit: cover;
      box-shadow: 0 2px 16px #0003;
    }

    /* Markdown styles */
    #markdown {
      max-width: 100%;
      line-height: 1.7;
    }

    #markdown p {
      margin: 1.2em 0;
      line-height: 1.7;
    }

    #markdown img {
      display: block;
      margin: 2em auto;
      max-width: 100%;
      height: auto;
      border-radius: 1.1rem;
      box-shadow: 0 2px 16px #0003;
      background: #23272a;
      padding: 0.2em;
    }

    #markdown pre {
      margin: 1.2em 0;
      overflow-x: auto;
      background: #1a1a1f;
      padding: 1.2em;
      border-radius: 0.8rem;
      border: 1px solid #2d2d35;
    }

    #markdown code {
      background: #1a1a1f;
      padding: 0.2em 0.4em;
      border-radius: 0.3rem;
      font-size: 0.9em;
      border: 1px solid #2d2d35;
    }

    #markdown pre code {
      background: none;
      border: none;
      padding: 0;
    }

    #markdown blockquote {
      margin: 1.2em 0;
      padding-left: 1.2em;
      border-left: 4px solid #3f3f46;
      color: #bcbcbc;
      font-style: italic;
    }

    #markdown h1,
    #markdown h2,
    #markdown h3 {
      color: #fff;
      font-family: Poppins, Inter, sans-serif;
      margin-top: 2em;
      margin-bottom: 0.5em;
      line-height: 1.3;
    }

    #markdown h1 {
      font-size: 1.8rem;
      border-bottom: 1px solid #2d2d35;
      padding-bottom: 0.3em;
    }

    #markdown h2 {
      font-size: 1.5rem;
    }

    #markdown h3 {
      font-size: 1.3rem;
    }

    #markdown ul, 
    #markdown ol {
      margin: 1.2em 0;
      padding-left: 1.5em;
    }

    #markdown li {
      margin: 0.5em 0;
    }

    /* Back link */
    .post-back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
      color: #0ea5e9;
      transition: color 0.2s;
      font-size: 0.95rem;
      text-decoration: none;
    }

    .post-back-link:hover {
      color: #38bdf8;
    }

    /* Top-right logo */
    .browser-logo {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .browser-logo:hover {
      transform: scale(1.05);
    }

    .browser-logo img {
      height: 3rem;
      width: 3rem;
    }

    .browser-logo span {
      margin-top: 0.4rem;
      font-size: 0.7rem;
      color: #bcbcbc;
      letter-spacing: 0.05em;
      text-align: center;
    }

    /* Card styling */
    .card {
      background: #18181b;
      border-radius: 1.5rem;
      border: 1px solid #2d2d35;
      transition: all 0.3s ease;
    }

    /* Mobile optimizations */
    @media (max-width: 600px) {
      .post-title {
        font-size: 1.6rem;
      }

      .browser-logo img {
        height: 2.2rem;
        width: 2.2rem;
      }

      .card {
        padding: 1rem 0.8rem !important;
        border-radius: 1rem !important;
        margin: 1rem 0.5rem !important;
        width: calc(100% - 1rem) !important;
      }

      footer {
        text-align: center;
        padding: 0 1rem;
      }

      footer div {
        line-height: 1.4;
      }

      #markdown h1 {
        font-size: 1.5rem;
      }

      #markdown h2 {
        font-size: 1.3rem;
      }

      #markdown h3 {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<body class="bg-[#0a0a0f] min-h-screen w-full">
  <!-- Logo at top right -->
  <div class="browser-logo" onclick="window.location.href='index.html'">
    <img src="style/logo.svg" alt="The Roots Logo" />
    <span>The Roots</span>
  </div>

  <main>
    <div
      class="card w-full max-w-4xl mx-auto my-6 px-6 sm:px-8 md:px-12 py-8">
      <!-- Top Back Button -->
      <div class="text-center mb-6">
        <a href="writings.html" class="post-back-link group inline-flex items-center gap-2 transition-colors">
          <span class="arrow text-xl transition-transform group-hover:-translate-x-1">&larr;</span>
          <span>Back to Writings</span>
        </a>
      </div>

      <!-- Post Meta (Title, Date, Image) -->
      <div id="meta"></div>
      
      <!-- Markdown Content -->
      <div id="markdown" class="prose prose-invert max-w-none"></div>

      <!-- Bottom Back Button -->
      <div class="text-center mt-8 pt-6 border-t border-gray-800">
        <a href="writings.html" class="post-back-link group inline-flex items-center gap-2 transition-colors">
          <span class="arrow text-xl transition-transform group-hover:-translate-x-1">&larr;</span>
          <span>Back to Writings</span>
        </a>
      </div>
    </div>
  </main>

  <footer class="w-full mt-12 pb-6 flex flex-col items-center text-gray-400 text-sm">
    <div>
      &copy; 2025 <span class="font-semibold text-gray-300">The Roots</span> &mdash; Crafted with 
      <span class="text-gray-500">&#9829;</span> and curiosity.
    </div>
    <div class="mt-1">
      <a href="https://github.com/ikenith/ikenith.github.io" target="_blank"
        class="underline hover:text-gray-300">GitHub</a>
      &middot;
      <span>The silent corner of the internet.</span>
    </div>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    const repo = "ikenith/ikenith.github.io";
    const branch = "main";

    function parseFrontmatter(md) {
      const match = md.match(/^---\s*([\s\S]*?)---/);
      let meta = {};
      let body = md;
      if (match) {
        const lines = match[1].split('\n');
        lines.forEach(line => {
          const [key, ...rest] = line.split(':');
          if (key && rest.length) {
            meta[key.trim()] = rest.join(':').trim().replace(/^"|"$/g, '');
          }
        });
        body = md.slice(match[0].length).trim();
      }
      return { meta, body };
    }

    async function loadPost() {
      const metaDiv = document.getElementById('meta');
      const markdownDiv = document.getElementById('markdown');
      metaDiv.innerHTML = '';
      markdownDiv.innerHTML = '<div class="text-center text-gray-400 py-8">Loading...</div>';
      
      if (!file) {
        markdownDiv.innerHTML = "<div class='text-center text-gray-400 py-8'>No post specified.</div>";
        return;
      }
      
      try {
        const res = await fetch(`https://api.github.com/repos/${repo}/contents/${file}?ref=${branch}`);
        if (!res.ok) throw new Error("Post not found");
        const data = await res.json();
        const md = atob(data.content.replace(/\n/g, ''));
        const { meta, body } = parseFrontmatter(md);

        let metaHtml = '';
        if (meta.image) metaHtml += `<div class="post-image"><img src="${meta.image}" alt="Post image"></div>`;
        if (meta.title) metaHtml += `<div class="post-title">${meta.title}</div>`;
        if (meta.date) metaHtml += `<div class="post-date">${meta.date}</div>`;
        metaDiv.innerHTML = metaHtml;

        // Configure marked options
        marked.setOptions({
          highlight: function(code, lang) {
            // Simple syntax highlighting fallback
            return code;
          },
          breaks: true,
          gfm: true
        });

        markdownDiv.innerHTML = marked.parse(body);
      } catch (err) {
        console.error('Error loading post:', err);
        markdownDiv.innerHTML = "<div class='text-center text-gray-400 py-8'>Failed to load post.</div>";
      }
    }
    
    loadPost();
  </script>
</body>

</html>
